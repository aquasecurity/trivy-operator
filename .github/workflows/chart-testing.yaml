---
name: Helm
on:
  push:
    branches:
      - main
    paths:
      - deploy/**
  pull_request:
    branches:
      - main
    paths:
      - deploy/**
env:
  KIND_VERSION: v0.30.0
  KIND_IMAGE: kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  chart-testing:
    name: Run chart testing
    runs-on: ubuntu-22.04
    env:
      DOCKER_CLI_EXPERIMENTAL: enabled
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@90e01b21170618765a73370fcc3abbd1684a7793 # v5
        with:
          remove-android: 'true'
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-cached-tools: 'true'
          remove-swapfile: 'true'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # was: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # was: docker/setup-buildx-action@v3
      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # was: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Release snapshot
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # was: goreleaser/goreleaser-action@v6
        with:
          version: v2.4.8
          args: release -f=goreleaser-e2e.yaml --snapshot --skip=publish --clean

      - name: Setup Kubernetes cluster (KIND)
        uses: engineerd/setup-kind@ecfad61750951586a9ef973db567df1d28671bdc # was: engineerd/setup-kind@v0.6.2
        with:
          version: ${{ env.KIND_VERSION }}
          image: ${{ env.KIND_IMAGE }}

      - name: Test connection to Kubernetes cluster
        run: |
          kubectl cluster-info
          kubectl wait --for=condition=Ready nodes --all --timeout=300s
          kubectl describe node
      - name: Install helm and yq
        run: >
          curl -fsSL -o get_helm.sh
          https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3

          chmod 700 get_helm.sh
      - name: update appVersion
        uses: mikefarah/yq@88a31ae8c6b34aad77d2efdecc146113cb3315d0 # was: mikefarah/yq@master
        with:
          cmd: yq -i '.appVersion = "ct"' ./deploy/helm/Chart.yaml
      - name: Load operator image to cluster
        run: >
          docker tag mirror.gcr.io/aquasec/trivy-operator:${{ github.sha }}-amd64
          mirror.gcr.io/aquasec/trivy-operator:ct

          docker save -o trivy-operator.tar mirror.gcr.io/aquasec/trivy-operator:ct

          kind load image-archive trivy-operator.tar

      - name: Set up python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # was: actions/setup-python@v5.6.0
        with:
          python-version: '3.x'
          check-latest: true

      - name: Setup chart-testing
        id: lint
        uses: helm/chart-testing-action@0d28d3144d3a25ea2cc349d6e59901c4ff469b3b # was: helm/chart-testing-action@v2.7.0
        with:
          # v6.0.0 resolved the compatibility issue with Python > 3.13. may be removed after the action itself is updated
          yamale_version: "6.0.0"

      - name: Run chart-testing
        run: ct lint-and-install --validate-maintainers=false --charts deploy/helm
