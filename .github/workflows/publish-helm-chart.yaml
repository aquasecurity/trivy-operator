---
# Triggered when a PR modifying the Helm chart is merged into main (or manually).
# Uses a GitHub App token to trigger the publish-chart workflow in the helm-charts repo.
name: Publish Helm chart
on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - deploy/helm/**
permissions: {}
jobs:
  publish-chart:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.HELM_CHARTS_GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.HELM_CHARTS_GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: helm-charts
      - name: Trigger publish-chart workflow in helm-charts
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REF: ${{ github.sha }}
        run: |
          gh workflow run publish-chart.yaml \
            --repo "$GITHUB_REPOSITORY_OWNER/helm-charts" \
            --ref main \
            --field "repository=$GITHUB_REPOSITORY" \
            --field "ref=$REF" \
            --field "chart_dir=deploy/helm"
