---
# Image-mode scan against Chainguard's distroless Trivy image
# (cgr.dev/chainguard/trivy). The scan container has no shell,
# no cat, no bzip2, no base64 — proves the scan-wrapper init
# container + compress path works in a distroless environment.
apiVersion: kuttl.dev/v1beta1
kind: TestSuite
commands:
  - command: helm install trivy-operator ./deploy/helm --namespace trivy-system
      --create-namespace --set="image.tag=e2e"
      --set="targetNamespaces=e2e-test"
      --set="trivy.image.registry=cgr.dev"
      --set="trivy.image.repository=chainguard/trivy"
      --set="trivy.image.tag=latest"
testDirs:
  - tests/e2e/image-mode-distroless
timeout: 240
kindNodeCache: true
