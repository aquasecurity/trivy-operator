name: "Lint PR title"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions: {}

jobs:
  pr-title-checker:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          VALID_TYPES: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            sec
            chore
            release
            revert
        run: |
          set -euo pipefail
            if [[ ! "$PR_TITLE" =~ ^(${VALID_TYPES// /|})(\(.+\))?:\ .+ ]]; then
                echo "Error: PR title does not follow the Conventional Commits format."
                echo "Expected format: <type>(<scope>): <description>"
                echo "Valid types: $VALID_TYPES"
                exit 1
            fi
