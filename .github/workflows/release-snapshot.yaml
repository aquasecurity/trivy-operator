---
# Release snapshot on CRON schedule (every night) or on demand.
name: Release snapshot

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *"

# Disable permissions granted to the GITHUB_TOKEN for all the available scopes.
permissions: {}

jobs:
  release-snapshot:
    name: Release unversioned snapshot
    runs-on: ubuntu-2404-4core
    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
    permissions:
      id-token: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # was: docker/setup-qemu-action@v4.1.0
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # was: docker/setup-buildx-action@v4.1.0
      - name: Available platforms
        run: echo "$PLATFORMS"
        env:
          PLATFORMS: ${{ steps.buildx.outputs.platforms }}
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # was: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # was: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod
          check-latest: true

      - name: Install ARM64 cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # was: sigstore/cosign-installer@v4.1.2
      - name: Release snapshot
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # was: goreleaser/goreleaser-action@v7.2.2
        with:
          version: v2.4.8
          args: release -f=goreleaser-e2e.yaml --snapshot --skip=publish --clean --timeout 120m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: 1
      - name: Scan Trivy Operator image for vulnerabilities
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # was: aquasecurity/trivy-action@master
        with:
          image-ref: 'mirror.gcr.io/aquasec/trivy-operator:${{ github.sha }}-amd64'
          exit-code: '1'
          ignore-unfixed: true
      - name: Scan Trivy Operator (ubi) image for vulnerabilities
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # was: aquasecurity/trivy-action@master
        with:
          image-ref: 'mirror.gcr.io/aquasec/trivy-operator:${{ github.sha }}-ubi9-amd64'
          exit-code: '1'
          ignore-unfixed: true
#      - name: Notify dedicated teams channel
