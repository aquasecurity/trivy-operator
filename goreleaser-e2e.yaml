version: 2

project_name: build_e2e
release:
  draft: false
  prerelease: auto
env:
  - GO111MODULE=on
  - CGO_ENABLED=0
  - GOEXPERIMENT=jsonv2
before:
  hooks:
    - go mod download
builds:
  - id: trivy-operator
    main: ./cmd/trivy-operator/main.go
    binary: trivy-operator
    goos:
      - linux
    goarch:
      - amd64
  - id: trivy-operator-fips
    main: ./cmd/trivy-operator/main.go
    binary: trivy-operator-fips
    flags:
      - -tags=fipsonly
    env:
      - CGO_ENABLED=1
      - GOEXPERIMENT=boringcrypto,jsonv2
    goos:
      - linux
    goarch:
      - amd64
archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    builds:
      - trivy-operator
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: checksums.txt
snapshot:
  version_template: "{{ .FullCommit }}"
changelog:
  sort: asc
  filters:
    exclude:
      - ^docs
      - ^test
      - ^release
dockers:
  - image_templates:
      - docker.io/afdesk/trivy-operator:{{ .Version }}-amd64
    use: buildx
    goos: linux
    dockerfile: build/trivy-operator/Dockerfile
    goarch: amd64
    ids:
      - trivy-operator
    build_flag_templates:
      - --label=org.opencontainers.image.title=trivy-operator
      - --label=org.opencontainers.image.description=Keeps trivy-operator resources updated
      - --label=org.opencontainers.image.vendor=Aqua Security
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.source=https://github.com/aquasecurity/trivy-operator
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.documentation=https://aquasecurity.github.io/trivy-operator/v{{
        .Version }}/
      - --platform=linux/amd64
  - image_templates:
      - "docker.io/afdesk/trivy-operator:{{ .Version }}-ubi9-amd64"
    use: buildx
    goos: linux
    dockerfile: build/trivy-operator/Dockerfile.ubi9
    goarch: amd64
    extra_files:
      - LICENSE
    ids:
      - trivy-operator
    build_flag_templates:
      - "--label=org.opencontainers.image.title=trivy-operator"
      - "--label=org.opencontainers.image.description=Keeps trivy-operator resources updated"
      - "--label=org.opencontainers.image.vendor=Aqua Security"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/aquasecurity/trivy-operator"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.documentation=https://aquasecurity.github.io/trivy-operator/v{{ .Version }}/"
      - "--platform=linux/amd64"
  - image_templates:
      - "docker.io/afdesk/trivy-operator:{{ .Version }}-ubi9-fips-amd64"
    use: buildx
    goos: linux
    dockerfile: build/trivy-operator/Dockerfile.fips.ubi9
    goarch: amd64
    extra_files:
      - LICENSE
    ids:
      - trivy-operator-fips
    build_flag_templates:
      - "--label=org.opencontainers.image.title=trivy-operator"
      - "--label=org.opencontainers.image.description=Keeps trivy-operator resources updated"
      - "--label=org.opencontainers.image.vendor=Aqua Security"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/aquasecurity/trivy-operator"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.documentation=https://aquasecurity.github.io/trivy-operator/v{{ .Version }}/"
      - "--platform=linux/amd64"
docker_manifests:
  - name_template: docker.io/afdesk/trivy-operator:{{ .Version }}
    image_templates:
      - docker.io/afdesk/trivy-operator:{{ .Version }}-amd64
  - name_template: "docker.io/afdesk/trivy-operator:{{ .Version }}-ubi9"
    image_templates:
      - "docker.io/afdesk/trivy-operator:{{ .Version }}-ubi9-amd64"
  - name_template: "docker.io/afdesk/trivy-operator:{{ .Version }}-ubi9-fips"
    image_templates:
      - "docker.io/afdesk/trivy-operator:{{ .Version }}-ubi9-fips-amd64"
