---
# Release snapshot on CRON schedule (every night) or on demand.
name: Release snapshot

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *"

# Disable permissions granted to the GITHUB_TOKEN for all the available scopes.
permissions: {}

jobs:
  release-snapshot:
    name: Release unversioned snapshot
    runs-on: ubuntu-2404-2core
    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
    permissions:
      id-token: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # was: docker/setup-qemu-action@v4.0.0
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # was: docker/setup-buildx-action@v4.0.0
      - name: Available platforms
        run: echo "$PLATFORMS"
        env:
          PLATFORMS: ${{ steps.buildx.outputs.platforms }}
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # was: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # was: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod
          check-latest: true
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # was: sigstore/cosign-installer@v4.1.2
      - name: Release snapshot
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # was: goreleaser/goreleaser-action@v7.2.2
        with:
          version: v2.4.8
          args: release -f=goreleaser-e2e.yaml --snapshot --skip=publish --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: 1
      - name: Scan Trivy Operator image for vulnerabilities
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # was: aquasecurity/trivy-action@master
        with:
          image-ref: 'mirror.gcr.io/aquasec/trivy-operator:${{ github.sha }}-amd64'
          exit-code: '1'
          ignore-unfixed: true
      - name: Scan Trivy Operator (ubi) image for vulnerabilities
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # was: aquasecurity/trivy-action@master
        with:
          image-ref: 'mirror.gcr.io/aquasec/trivy-operator:${{ github.sha }}-ubi9-amd64'
          exit-code: '1'
          ignore-unfixed: true
      - name: Notify dedicated teams channel
        uses: jdcargile/ms-teams-notification@28e5ca976c053d54e2b852f3f38da312f35a24fc # was: jdcargile/ms-teams-notification@v1.4
        if: failure()
        with:
          github-token: ${{ secrets.ORG_REPO_TOKEN }}
          ms-teams-webhook-uri: ${{ secrets.TRIVY_MSTEAMS_WEBHOOK }}
          notification-summary: vulnerabilities has been found in trivy-operator image
          notification-color: 17a2b8
          timezone: America/Denver
